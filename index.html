<!DOCTYPE html>
<html lang="en">

  <meta name="description" content="Track Bangladesh Bank circulars, regulations, and policy changes in one clean interface." />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-hover: #f1f5f9;
      --border: #e2e8f0;
      --border2: #cbd5e1;
      --text: #0f172a;
      --text-secondary: #475569;
      --muted: #94a3b8;
      --primary: #1e3a5f;
      --primary-light: #2d5a8e;
      --primary-bg: rgba(30,58,95,0.06);
      --accent: #3b82f6;
      --accent-bg: rgba(59,130,246,0.08);
      --timeline-line: #cbd5e1;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 10px;
    }

    :root.dark {
      --bg: #0c1222;
      --surface: #131c31;
      --surface-hover: #1a2540;
      --border: #1e2d4a;
      --border2: #2a3f66;
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --muted: #64748b;
      --primary: #60a5fa;
      --primary-light: #93c5fd;
      --primary-bg: rgba(96,165,250,0.1);
      --accent: #60a5fa;
      --accent-bg: rgba(96,165,250,0.1);
      --timeline-line: #2a3f66;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--primary);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo {
      font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
      display: flex; align-items: center; gap: 8px;
    }
    .header-logo svg { width: 24px; height: 24px; }
    .header-subtitle { font-size: 11px; opacity: 0.7; font-weight: 400; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      background: rgba(255,255,255,0.12); border: none; color: #fff;
      width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.2); }

    /* Search bar */
    .search-container {
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .search-box {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      transition: border-color 0.15s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-box input {
      flex: 1; border: none; outline: none;
      background: transparent; color: var(--text);
      font-size: 14px; font-family: inherit;
    }
    .search-box input::placeholder { color: var(--muted); }
    .search-box svg { color: var(--muted); flex-shrink: 0; }

    /* Filters */
    .filters-bar {
      padding: 12px 24px;
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .filter-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: var(--border2); background: var(--surface-hover); }
    .filter-chip.active {
      border-color: transparent;
      color: #fff;
    }
    .filter-chip .dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .dept-select {
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer; font-family: inherit;
      outline: none;
    }
    .filter-clear {
      font-size: 12px; color: var(--accent);
      cursor: pointer; background: none; border: none;
      font-family: inherit; font-weight: 500;
      padding: 5px 8px;
    }
    .filter-clear:hover { text-decoration: underline; }

    /* Stats bar */
    .stats-bar {
      padding: 10px 24px;
      font-size: 12px; color: var(--muted);
      display: flex; justify-content: space-between; align-items: center;
    }
    .view-toggle { display: flex; gap: 4px; }
    .view-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 4px 8px; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center;
    }
    .view-btn.active { background: var(--primary-bg); color: var(--primary); border-color: var(--primary); }

    /* Main content */
    .main { max-width: 900px; margin: 0 auto; padding: 0 24px 80px; }

    /* Timeline */
    .timeline { position: relative; padding: 20px 0 20px 32px; }
    .timeline::before {
      content: ''; position: absolute;
      left: 11px; top: 0; bottom: 0;
      width: 2px; background: var(--timeline-line);
    }
    .month-group { margin-bottom: 24px; }
    .month-label {
      position: relative;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted);
      margin-bottom: 12px; padding: 4px 0;
    }
    .month-label::before {
      content: ''; position: absolute;
      left: -27px; top: 50%; transform: translateY(-50%);
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--border2);
      border: 2px solid var(--bg);
    }

    /* Circular card */
    .circular-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .circular-card:hover {
      border-color: var(--border2);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }
    .circular-card::before {
      content: ''; position: absolute;
      left: -27px; top: 22px;
      width: 8px; height: 8px; border-radius: 50%;
      border: 2px solid var(--accent);
      background: var(--surface);
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 6px; gap: 12px;
    }
    .card-number {
      font-size: 11px; font-weight: 600;
      color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.02em;
    }
    .card-date {
      font-size: 11px; color: var(--muted);
      white-space: nowrap;
    }
    .card-title {
      font-size: 14px; font-weight: 500;
      color: var(--text);
      line-height: 1.45;
      margin-bottom: 10px;
    }
    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 6px;
    }
    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .tag-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 12px;
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.02em;
    }
    .card-dept {
      font-size: 11px; color: var(--muted);
      padding: 2px 8px;
      background: var(--primary-bg);
      border-radius: 12px;
    }
    .card-pdfs {
      display: flex; gap: 6px; margin-top: 8px;
    }
    .pdf-link {
      font-size: 11px; font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--accent-bg);
      transition: opacity 0.15s;
    }
    .pdf-link:hover { opacity: 0.8; }

    /* List view */
    .list-view .circular-card { border-radius: 0; margin-bottom: 0; border-bottom: none; }
    .list-view .circular-card:first-child { border-radius: var(--radius) var(--radius) 0 0; }
    .list-view .circular-card:last-child { border-radius: 0 0 var(--radius) var(--radius); border-bottom: 1px solid var(--border); }
    .list-view .circular-card::before { display: none; }

    /* Detail modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 40px 16px;
      overflow-y: auto;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--surface);
      border-radius: 14px;
      width: 100%; max-width: 720px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .modal-close {
      background: var(--surface-hover); border: none; color: var(--text);
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .modal-body { padding: 24px; }
    .modal-meta {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px; margin-bottom: 20px;
    }
    .meta-item label {
      display: block; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); margin-bottom: 4px;
    }
    .meta-item span { font-size: 13px; font-weight: 500; }
    .modal-summary {
      background: var(--primary-bg);
      border-radius: 8px;
      padding: 16px; margin-bottom: 20px;
      font-size: 14px; line-height: 1.7;
      color: var(--text-secondary);
    }
    .modal-pdf-section { margin-bottom: 20px; }
    .modal-pdf-section h4 {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); margin-bottom: 10px;
    }
    .pdf-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .pdf-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--text);
      transition: all 0.15s;
    }
    .pdf-btn:hover { background: var(--surface-hover); border-color: var(--border2); }
    .pdf-btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
    .pdf-btn.primary:hover { opacity: 0.9; }

    /* Status badges */
    .status-active { color: #16a34a; }
    .status-superseded { color: #dc2626; text-decoration: line-through; }
    .status-amended { color: #d97706; }

    /* Plain summary section */
    .plain-summary {
      background: linear-gradient(135deg, var(--accent-bg), var(--primary-bg));
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 14px; line-height: 1.75;
      color: var(--text);
    }
    .plain-summary-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--accent); margin-bottom: 10px;
    }

    /* Expert insight section */
    .expert-insight {
      background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(59,130,246,0.06));
      border-left: 3px solid #8b5cf6;
      border-radius: 0 8px 8px 0;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 14px; line-height: 1.75;
      color: var(--text);
    }
    .expert-insight-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #8b5cf6; margin-bottom: 10px;
    }

    /* Key changes / diff view */
    .diff-section { margin-bottom: 20px; }
    .diff-section h4 {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .diff-table {
      width: 100%; border-collapse: separate;
      border-spacing: 0; border-radius: 8px;
      overflow: hidden; border: 1px solid var(--border);
    }
    .diff-table th {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 10px 14px; text-align: left;
      background: var(--primary-bg); color: var(--text-secondary);
    }
    .diff-table td {
      padding: 10px 14px; font-size: 13px;
      border-top: 1px solid var(--border);
      vertical-align: top; line-height: 1.5;
    }
    .diff-table .field-name {
      font-weight: 600; color: var(--text);
      white-space: nowrap; width: 140px;
    }
    .diff-before {
      background: rgba(220,38,38,0.05);
      color: var(--text-secondary);
    }
    .diff-after {
      background: rgba(22,163,74,0.05);
      color: var(--text);
    }

    /* Related circulars */
    .related-section { margin-bottom: 20px; }
    .related-section h4 {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .related-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .related-card:hover {
      border-color: var(--accent);
      background: var(--accent-bg);
    }
    .relation-badge {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 3px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0;
    }
    .relation-supersedes { background: rgba(220,38,38,0.12); color: #dc2626; }
    .relation-amends { background: rgba(217,119,6,0.12); color: #d97706; }
    .relation-clarifies { background: rgba(16,185,129,0.12); color: #10b981; }
    .relation-related { background: rgba(139,92,246,0.12); color: #8b5cf6; }
    .related-info { flex: 1; min-width: 0; }
    .related-number { font-size: 11px; font-weight: 600; color: var(--accent); }
    .related-title {
      font-size: 12px; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Modal tabs */
    .modal-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .modal-tab {
      padding: 12px 16px;
      font-size: 13px; font-weight: 500;
      color: var(--muted);
      background: none; border: none;
      cursor: pointer; font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .modal-tab:hover { color: var(--text); }
    .modal-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .modal-tab-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 5px;
      border-radius: 9px; font-size: 10px; font-weight: 700;
      background: var(--accent-bg); color: var(--accent);
      margin-left: 6px;
    }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; }

    /* Loading */
    .spinner {
      display: flex; justify-content: center; padding: 40px;
    }
    .spinner::after {
      content: ''; width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 640px) {
      .header { padding: 0 16px; }
      .search-container { padding: 12px 16px; }
      .filters-bar { padding: 10px 16px; }
      .stats-bar { padding: 8px 16px; }
      .main { padding: 0 16px 80px; }
      .timeline { padding-left: 24px; }
      .timeline::before { left: 7px; }
      .month-label::before { left: -21px; width: 8px; height: 8px; }
      .circular-card::before { left: -21px; width: 6px; height: 6px; }
      .modal-overlay { padding: 20px 8px; }
      .modal-meta { grid-template-columns: 1fr 1fr; }
      .header-subtitle { display: none; }
    }
  </style>
</head>

  x: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>,
  ext: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
  admin: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>,
};

// ─── Date helpers ────────────────────────────────────────
function formatDate(d) {
  return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}
function monthKey(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(key) {
  const [y, m] = key.split('-');
  return new Date(y, m-1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

// ─── Tag badge component ─────────────────────────────────
function TagBadge({ tag }) {
  return (
    <span className="tag-badge" style={{
      background: tag.color + '18',
      color: tag.color,
    }}>
      {tag.label}
    </span>
  );
}

// ─── Circular Card ───────────────────────────────────────
function CircularCard({ c, tags, onClick }) {
  const circularTags = (c.tags || []).map(t => tags.find(tg => tg.id === t.tag_id)).filter(Boolean);
  return (
    <div className="circular-card" onClick={() => onClick(c)}>
      <div className="card-header">
        <span className="card-number">{c.circular_number}</span>
        <span className="card-date">{formatDate(c.issued_date)}</span>
      </div>
      <div className="card-title">
        {c.title}
        {c.plain_summary && (
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, marginLeft: 6, fontSize: 10, fontWeight: 600, color: 'var(--accent)', verticalAlign: 'middle' }}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            Analyzed
          </span>
        )}
      </div>
      <div className="card-footer">
        <div className="card-tags">
          {circularTags.map(t => <TagBadge key={t.id} tag={t} />)}
        </div>
        <span className="card-dept">{c.department}</span>
      </div>
      {(c.pdf_url_en || c.pdf_url_bn) && (
        <div className="card-pdfs">
          {c.pdf_url_en && <a className="pdf-link" href={c.pdf_url_en} target="_blank" rel="noopener" onClick={e => e.stopPropagation()}><Icon.pdf /> English PDF</a>}
          {c.pdf_url_bn && <a className="pdf-link" href={c.pdf_url_bn} target="_blank" rel="noopener" onClick={e => e.stopPropagation()}><Icon.pdf /> Bangla PDF</a>}
        </div>
      )}
    </div>
  );
}

// ─── Detail Modal ────────────────────────────────────────
function DetailModal({ circular: c, tags, circulars, onClose, onNavigate }) {
  if (!c) return null;
  const circularTags = (c.tags || []).map(t => tags.find(tg => tg.id === t.tag_id)).filter(Boolean);
  const [activeTab, setActiveTab] = useState('overview');
  const [relations, setRelations] = useState([]);
  const [loadingExtra, setLoadingExtra] = useState(true);

  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handler);
    document.body.style.overflow = 'hidden';
    return () => {
      document.removeEventListener('keydown', handler);
      document.body.style.overflow = '';
    };
  }, [onClose]);

  // Fetch relations
  useEffect(() => {
    async function loadExtra() {
      setLoadingExtra(true);
      const relRes = await sb.from('circular_relations').select('*').or(`source_circular_id.eq.${c.id},target_circular_id.eq.${c.id}`);
      if (relRes.data) setRelations(relRes.data);
      setLoadingExtra(false);
    }
    loadExtra();
    setActiveTab('overview');
  }, [c.id]);

  // Build related circulars with context
  const relatedCirculars = relations.map(r => {
    const isSource = r.source_circular_id === c.id;
    const otherId = isSource ? r.target_circular_id : r.source_circular_id;
    const other = circulars.find(ci => ci.id === otherId);
    return {
      ...r,
      other,
      direction: isSource ? 'outgoing' : 'incoming',
      label: isSource ? r.relation_type : (
        r.relation_type === 'supersedes' ? 'superseded by' :
        r.relation_type === 'amends' ? 'amended by' :
        r.relation_type === 'clarifies' ? 'clarified by' : 'related'
      ),
    };
  }).filter(r => r.other);

  const keyChanges = c.key_changes || [];

  return (
    <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <span className="card-number" style={{ fontSize: 13 }}>{c.circular_number}</span>
            <h2 style={{ fontSize: 18, fontWeight: 600, marginTop: 6, lineHeight: 1.4 }}>{c.title}</h2>
            {c.title_bn && <p style={{ fontSize: 14, color: 'var(--text-secondary)', marginTop: 4 }}>{c.title_bn}</p>}
          </div>
          <button className="modal-close" onClick={onClose}><Icon.x /></button>
        </div>

        {/* Tabs */}
        <div className="modal-tabs">
          <button className={`modal-tab ${activeTab === 'overview' ? 'active' : ''}`} onClick={() => setActiveTab('overview')}>
            Overview
          </button>
          {keyChanges.length > 0 && (
            <button className={`modal-tab ${activeTab === 'changes' ? 'active' : ''}`} onClick={() => setActiveTab('changes')}>
              What Changed
            </button>
          )}
          {relatedCirculars.length > 0 && (
            <button className={`modal-tab ${activeTab === 'related' ? 'active' : ''}`} onClick={() => setActiveTab('related')}>
              Related
              <span className="modal-tab-badge">{relatedCirculars.length}</span>
            </button>
          )}
        </div>

        <div className="modal-body">
          {/* ─── Overview Tab ─── */}
          {activeTab === 'overview' && (
            <>
              <div className="modal-meta">
                <div className="meta-item">
                  <label>Issued Date</label>
                  <span>{formatDate(c.issued_date)}</span>
                </div>
                {c.effective_date && (
                  <div className="meta-item">
                    <label>Effective Date</label>
                    <span>{formatDate(c.effective_date)}</span>
                  </div>
                )}
                <div className="meta-item">
                  <label>Department</label>
                  <span>{c.department}</span>
                </div>
                <div className="meta-item">
                  <label>Status</label>
                  <span className={`status-${c.status}`}>{c.status.charAt(0).toUpperCase() + c.status.slice(1)}</span>
                </div>
              </div>

              {circularTags.length > 0 && (
                <div style={{ marginBottom: 20, display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  {circularTags.map(t => <TagBadge key={t.id} tag={t} />)}
                </div>
              )}

              {/* Plain-language summary */}
              {c.plain_summary && (
                <div className="plain-summary">
                  <div className="plain-summary-label">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    What this means for your bank
                  </div>
                  {c.plain_summary}
                </div>
              )}

              {c.summary && !c.plain_summary && (
                <div className="modal-summary">
                  <strong style={{ fontSize: 12, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--muted)', display: 'block', marginBottom: 8 }}>Summary</strong>
                  {c.summary}
                </div>
              )}

              {/* Expert Insight */}
              {c.expert_insight && (
                <div className="expert-insight">
                  <div className="expert-insight-label">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
                    Expert Insight
                  </div>
                  {c.expert_insight}
                </div>
              )}

              {(c.pdf_url_en || c.pdf_url_bn || c.source_url) && (
                <div className="modal-pdf-section">
                  <h4>Documents</h4>
                  <div className="pdf-buttons">
                    {c.pdf_url_en && <a className="pdf-btn primary" href={c.pdf_url_en} target="_blank" rel="noopener"><Icon.pdf /> English PDF</a>}
                    {c.pdf_url_bn && <a className="pdf-btn primary" href={c.pdf_url_bn} target="_blank" rel="noopener"><Icon.pdf /> Bangla PDF</a>}
                    {c.source_url && <a className="pdf-btn" href={c.source_url} target="_blank" rel="noopener"><Icon.ext /> BB Website</a>}
                  </div>
                </div>
              )}
            </>
          )}

          {/* ─── What Changed Tab ─── */}
          {activeTab === 'changes' && keyChanges.length > 0 && (
            <div className="diff-section">
              <h4>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M16 3h5v5"/><path d="M8 3H3v5"/><path d="M12 22v-8.3a4 4 0 00-1.172-2.872L3 3"/><path d="m15 9 6-6"/></svg>
                Key Changes from Previous Circular
              </h4>
              <table className="diff-table">
                <thead>
                  <tr>
                    <th>Area</th>
                    <th>Before</th>
                    <th>After</th>
                  </tr>
                </thead>
                <tbody>
                  {keyChanges.map((change, i) => (
                    <tr key={i}>
                      <td className="field-name">{change.field}</td>
                      <td className="diff-before">{change.before}</td>
                      <td className="diff-after">{change.after}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* ─── Related Tab ─── */}
          {activeTab === 'related' && (
            <div className="related-section">
              <h4>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98"/><path d="M15.41 6.51l-6.82 3.98"/></svg>
                Related Circulars
              </h4>
              {relatedCirculars.map(r => (
                <div key={r.id} className="related-card" onClick={() => onNavigate(r.other)}>
                  <span className={`relation-badge relation-${r.relation_type}`}>
                    {r.label}
                  </span>
                  <div className="related-info">
                    <div className="related-number">{r.other.circular_number}</div>
                    <div className="related-title">{r.other.title}</div>
                  </div>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round"><path d="M9 18l6-6-6-6"/></svg>
                </div>
              ))}
              {relatedCirculars.some(r => r.description) && (
                <div style={{ marginTop: 12 }}>
                  {relatedCirculars.filter(r => r.description).map(r => (
                    <p key={r.id} style={{ fontSize: 12, color: 'var(--muted)', lineHeight: 1.6, marginBottom: 6 }}>
                      <strong style={{ color: 'var(--text-secondary)' }}>{r.other.circular_number}:</strong> {r.description}
                    </p>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────
function App() {
  const [circulars, setCirculars] = useState([]);
  const [tags, setTags] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [selectedTags, setSelectedTags] = useState([]);
  const [selectedDept, setSelectedDept] = useState('');
  const [viewMode, setViewMode] = useState('timeline');
  const [selectedCircular, setSelectedCircular] = useState(null);
  const [darkMode, setDarkMode] = useState(() => {
    const saved = localStorage.getItem('pp-dark');
    return saved ? saved === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
  });

  // Dark mode
  useEffect(() => {
    document.documentElement.classList.toggle('dark', darkMode);
    localStorage.setItem('pp-dark', darkMode);
  }, [darkMode]);

  // Fetch data
  useEffect(() => {
    async function load() {
      setLoading(true);
      const [circRes, tagRes] = await Promise.all([
        sb.from('circulars').select('*, tags:circular_tags(tag_id), plain_summary, expert_insight, key_changes').order('issued_date', { ascending: false }),
        sb.from('tags').select('*').order('label'),
      ]);
      if (circRes.data) setCirculars(circRes.data);
      if (tagRes.data) setTags(tagRes.data);
      setLoading(false);
    }
    load();
  }, []);

  // Departments list
  const departments = useMemo(() => {
    const depts = [...new Set(circulars.map(c => c.department))].sort();
    return depts;
  }, [circulars]);

  // Filter
  const filtered = useMemo(() => {
    let result = circulars;
    if (search.trim()) {
      const q = search.toLowerCase();
      result = result.filter(c =>
        c.title.toLowerCase().includes(q) ||
        c.circular_number.toLowerCase().includes(q) ||
        (c.summary && c.summary.toLowerCase().includes(q)) ||
        c.department.toLowerCase().includes(q)
      );
    }
    if (selectedTags.length > 0) {
      result = result.filter(c => {
        const cTagIds = (c.tags || []).map(t => t.tag_id);
        return selectedTags.some(st => cTagIds.includes(st));
      });
    }
    if (selectedDept) {
      result = result.filter(c => c.department === selectedDept);
    }
    return result;
  }, [circulars, search, selectedTags, selectedDept]);

  // Group by month for timeline
  const grouped = useMemo(() => {
    const groups = {};
    filtered.forEach(c => {
      const mk = monthKey(c.issued_date);
      if (!groups[mk]) groups[mk] = [];
      groups[mk].push(c);
    });
    return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
  }, [filtered]);

  const toggleTag = (tagId) => {
    setSelectedTags(prev =>
      prev.includes(tagId) ? prev.filter(t => t !== tagId) : [...prev, tagId]
    );
  };

  const clearFilters = () => {
    setSearch('');
    setSelectedTags([]);
    setSelectedDept('');
  };

  const hasFilters = search || selectedTags.length > 0 || selectedDept;

  return (
    <>
      {/* Header */}
      <header className="header">
        <div className="header-left">
          <div className="header-logo">
            <Icon.pulse />
            <div>
              Policy Pulse
              <div className="header-subtitle">Bangladesh Bank Circular Tracker</div>
            </div>
          </div>
        </div>
        <div className="header-actions">
          <a href="admin.html" className="icon-btn" title="Admin"><Icon.admin /></a>
          <button className="icon-btn" onClick={() => setDarkMode(d => !d)} title="Toggle theme">
            {darkMode ? <Icon.sun /> : <Icon.moon />}
          </button>
        </div>
      </header>

      {/* Search */}
      <div className="search-container">
        <div className="search-box">
          <Icon.search />
          <input
            type="text"
            placeholder="Search circulars by title, number, department..."
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
          {search && (
            <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--muted)' }} onClick={() => setSearch('')}>
              <Icon.x />
            </button>
          )}
        </div>
      </div>

      {/* Filter chips */}
      <div className="filters-bar">
        {tags.map(t => (
          <button
            key={t.id}
            className={`filter-chip ${selectedTags.includes(t.id) ? 'active' : ''}`}
            style={selectedTags.includes(t.id) ? { background: t.color, borderColor: t.color } : {}}
            onClick={() => toggleTag(t.id)}
          >
            {!selectedTags.includes(t.id) && <span className="dot" style={{ background: t.color }} />}
            {t.label}
          </button>
        ))}
        {departments.length > 0 && (
          <select
            className="dept-select"
            value={selectedDept}
            onChange={e => setSelectedDept(e.target.value)}
          >
            <option value="">All Departments</option>
            {departments.map(d => <option key={d} value={d}>{d}</option>)}
          </select>
        )}
        {hasFilters && <button className="filter-clear" onClick={clearFilters}>Clear all</button>}
      </div>

      {/* Stats + view toggle */}
      <div className="stats-bar">
        <span>{filtered.length} circular{filtered.length !== 1 ? 's' : ''}{hasFilters ? ' (filtered)' : ''}</span>
        <div className="view-toggle">
          <button className={`view-btn ${viewMode === 'timeline' ? 'active' : ''}`} onClick={() => setViewMode('timeline')}>
            <Icon.timeline />
          </button>
          <button className={`view-btn ${viewMode === 'list' ? 'active' : ''}`} onClick={() => setViewMode('list')}>
            <Icon.list />
          </button>
        </div>
      </div>

      {/* Content */}
      <div className="main">
        {loading ? (
          <div className="spinner" />
        ) : filtered.length === 0 ? (
          <div className="empty-state">
            <Icon.search />
            <h3>No circulars found</h3>
            <p>{hasFilters ? 'Try adjusting your filters or search terms.' : 'No circulars have been added yet.'}</p>
          </div>
        ) : viewMode === 'timeline' ? (
          <div className="timeline">
            {grouped.map(([mk, items]) => (
              <div key={mk} className="month-group">
                <div className="month-label">{monthLabel(mk)}</div>
                {items.map(c => (
                  <CircularCard key={c.id} c={c} tags={tags} onClick={setSelectedCircular} />
                ))}
              </div>
            ))}
          </div>
        ) : (
          <div className="list-view" style={{ paddingTop: 20 }}>
            {filtered.map(c => (
              <CircularCard key={c.id} c={c} tags={tags} onClick={setSelectedCircular} />
            ))}
          </div>
        )}
      </div>

      {/* Detail modal */}
      {selectedCircular && (
        <DetailModal
          circular={selectedCircular}
          tags={tags}
          circulars={circulars}
          onClose={() => setSelectedCircular(null)}
          onNavigate={(c) => setSelectedCircular(c)}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
