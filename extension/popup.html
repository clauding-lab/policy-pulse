<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px; min-height: 200px;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #f8fafc; color: #0f172a;
    }
    .header {
      background: #1e3a5f; color: #fff;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header small { font-size: 11px; opacity: 0.7; display: block; }
    .content { padding: 16px; }

    .status {
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .status.info { background: #eff6ff; color: #1d4ed8; }
    .status.success { background: #f0fdf4; color: #16a34a; }
    .status.error { background: #fef2f2; color: #dc2626; }
    .status.warn { background: #fffbeb; color: #d97706; }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #16a34a; }
    .dot.red { background: #dc2626; }
    .dot.blue { background: #3b82f6; }
    .dot.orange { background: #d97706; }

    .btn {
      display: block; width: 100%;
      padding: 10px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      border: none; cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #1e3a5f; color: #fff; }
    .btn-secondary { background: #e2e8f0; color: #475569; }

    .stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin: 12px 0;
    }
    .stat {
      background: #fff; border: 1px solid #e2e8f0;
      border-radius: 8px; padding: 10px;
      text-align: center;
    }
    .stat-value { font-size: 22px; font-weight: 700; color: #1e3a5f; }
    .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }

    .circular-list {
      max-height: 250px; overflow-y: auto;
      border: 1px solid #e2e8f0; border-radius: 8px;
      margin: 12px 0;
    }
    .circular-item {
      padding: 8px 12px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 12px;
    }
    .circular-item:last-child { border-bottom: none; }
    .circular-item .num { font-weight: 600; color: #3b82f6; }
    .circular-item .title { color: #475569; margin-top: 2px; }
    .circular-item .date { color: #94a3b8; font-size: 11px; }

    .progress {
      background: #e2e8f0; border-radius: 4px; height: 6px;
      margin: 8px 0; overflow: hidden;
    }
    .progress-bar {
      height: 100%; background: #1e3a5f; border-radius: 4px;
      transition: width 0.3s;
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #e2e8f0;
      font-size: 11px; color: #94a3b8;
      text-align: center;
    }
    .footer a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    <div>
      <h1>Policy Pulse Clipper</h1>
      <small>BB Circular Data Extractor</small>
    </div>
  </div>

  <div class="content" id="content">
    <div class="status info"><div class="dot blue"></div>Checking page...</div>
  </div>

  <div class="footer">
    Data is sent to <a href="#" id="app-link">Policy Pulse</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
